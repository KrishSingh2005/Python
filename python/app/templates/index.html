<!DOCTYPE html>
<html>
<head>
    <title>Guess Number Game</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        function showAlert(msg) {
            if (msg !== "") {
                alert(msg);

                // 🔊 Sound effect
                var audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
                audio.play();
            }
        }
    </script>
</head>

<body onload="showAlert('{{alert}}')" class="bg-dark text-white">

<div class="container text-center mt-5">

    <!-- Title -->
    <h1 class="mb-4">🎯 Guess The Number</h1>

    <!-- Difficulty Selector -->
    <form method="POST" class="mb-4">
        <select name="level" class="form-select w-25 mx-auto" onchange="this.form.submit()">
            <option value="easy" {% if level=='easy' %}selected{% endif %}>Easy (1-50)</option>
            <option value="medium" {% if level=='medium' %}selected{% endif %}>Medium (1-100)</option>
            <option value="hard" {% if level=='hard' %}selected{% endif %}>Hard (1-200)</option>
        </select>
    </form>

    <!-- Guess Form -->
    <form method="POST">
        <input type="number" name="guess" class="form-control w-25 mx-auto mb-3" placeholder="Enter number" required>
        <button class="btn btn-success px-4">Guess</button>
    </form>

    <!-- Message (Win / Lose / Hint) -->
    {% if "Lost" in message %}
        <h3 class="mt-4 text-danger">{{ message }}</h3>
    {% elif "Won" in message %}
        <h3 class="mt-4 text-success">{{ message }}</h3>
    {% else %}
        <h3 class="mt-4">{{ message }}</h3>
    {% endif %}

    <!-- Attempts -->
    <h4 class="mt-3">
        🔥 Attempts: {{ attempts }} / {{ max_attempts }}
    </h4>

    <!-- Restart Button -->
    <form method="GET" class="mt-4">
        <button class="btn btn-warning px-4">🔁 Restart Game</button>
    </form>

</div>

</body>
</html>
